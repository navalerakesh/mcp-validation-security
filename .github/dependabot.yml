version: 2
updates:
  # .NET (NuGet) dependencies
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "navalerakesh"
    groups:
      all-nuget:
        patterns:
          - "*"

  # npm dependencies (mcpval-mcp)
  - package-ecosystem: "npm"
    directory: "/mcpval-mcp"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "navalerakesh"
    groups:
      all-npm:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "navalerakesh"
    groups:
      all-actions:
        patterns:
          - "*"
