name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: 'csharp'
            build-mode: manual
          - language: 'javascript-typescript'
            build-mode: none

    steps:
      - name: Check code scanning availability
        id: code-scanning
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o code-scanning-status.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          message=$(jq -r '.message // empty' code-scanning-status.json 2>/dev/null || true)
          echo "enabled=false" >> "$GITHUB_OUTPUT"

          if [ -n "$message" ]; then
            echo "::warning::Skipping CodeQL because code scanning is unavailable for ${GITHUB_REPOSITORY}: ${message}"
          else
            echo "::warning::Skipping CodeQL because code scanning is unavailable for ${GITHUB_REPOSITORY} (HTTP ${status})."
          fi

      - name: CodeQL unavailable
        if: steps.code-scanning.outputs.enabled != 'true'
        run: echo "GitHub code scanning is not enabled for this repository; CodeQL analysis was skipped." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.code-scanning.outputs.enabled == 'true'

      - name: Setup .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcpval-mcp/package-lock.json

      - name: Initialize CodeQL
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Restore .NET dependencies
        if: steps.code-scanning.outputs.enabled == 'true' && matrix.language == 'csharp'
        run: dotnet restore --locked-mode

      - name: Build .NET
        if: steps.code-scanning.outputs.enabled == 'true' && matrix.language == 'csharp'
        run: dotnet build --no-restore --configuration Release

      - name: Install npm dependencies
        if: steps.code-scanning.outputs.enabled == 'true' && matrix.language == 'javascript-typescript'
        working-directory: mcpval-mcp
        run: npm ci

      - name: Build npm package
        if: steps.code-scanning.outputs.enabled == 'true' && matrix.language == 'javascript-typescript'
        working-directory: mcpval-mcp
        run: npm run build

      - name: Perform CodeQL Analysis
        if: steps.code-scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: /language:${{ matrix.language }}