name: Docs Lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.lycheeignore'
      - '.github/workflows/docs-lint.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '.markdownlint.json'
      - '.lycheeignore'
      - '.github/workflows/docs-lint.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          config: .markdownlint.json
          globs: |
            README.md
            QUICKSTART.md
            SECURITY.md
            CONTRIBUTING.md
            docs/**/*.md
            Mcp.Benchmark.CLI/README.md
            Mcp.Benchmark.Tests/README.md
            Mcp.Benchmark.Tests/Fixtures/**/*.md
            Mcp.Compliance.Spec/schema/README.md
            mcpval-mcp/README.md

  links:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --max-retries 2
            --accept 200,429
            --root-dir .
            --exclude-path node_modules
            --exclude-path PublicReports
            --exclude-path test-output
            --exclude-path Mcp.Benchmark.CLI/bin
            --exclude-path Mcp.Benchmark.Tests/bin
            --exclude-path Mcp.Benchmark.Tests/obj
            --exclude-path Mcp.Benchmark.Tests/TestResults
            'README.md' 'QUICKSTART.md' 'SECURITY.md' 'CONTRIBUTING.md' 'docs/**/*.md' 'Mcp.Benchmark.CLI/README.md' 'Mcp.Benchmark.Tests/README.md' 'Mcp.Benchmark.Tests/Fixtures/**/*.md' 'Mcp.Compliance.Spec/schema/README.md' 'mcpval-mcp/README.md'