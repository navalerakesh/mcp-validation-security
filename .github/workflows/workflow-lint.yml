name: Workflow Lint

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        run: |
          docker run --rm \
            -v "$PWD":/repo \
            -w /repo \
            rhysd/actionlint:1.7.7