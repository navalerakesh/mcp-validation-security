name: Backfill Release Signatures

on:
  workflow_dispatch:
    inputs:
      release-count:
        description: Number of recent releases to sign.
        required: true
        default: "5"

permissions:
  contents: read

jobs:
  sign-releases:
    name: Sign Recent Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.6.3

      - name: Sign recent release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COUNT: ${{ inputs.release-count }}
        run: |
          set -euo pipefail

          if ! [[ "$RELEASE_COUNT" =~ ^[1-9][0-9]*$ ]]; then
            echo "release-count must be a positive integer." >&2
            exit 1
          fi

          tags=$(gh release list --limit "$RELEASE_COUNT" --json tagName --jq '.[].tagName')
          if [[ -z "$tags" ]]; then
            echo "No releases found to sign." >&2
            exit 1
          fi

          while IFS= read -r tag; do
            if [[ -z "$tag" ]]; then
              continue
            fi

            work_dir="$RUNNER_TEMP/release-signing/$tag"
            rm -rf "$work_dir"
            mkdir -p "$work_dir"

            gh release download "$tag" --dir "$work_dir" --clobber

            mapfile -t artifacts < <(find "$work_dir" -maxdepth 1 -type f \
              ! -name '*.sig' \
              ! -name '*.pem' \
              ! -name '*.sigstore.json' \
              ! -name '*.intoto.jsonl' \
              -print | sort)

            if [[ "${#artifacts[@]}" -eq 0 ]]; then
              echo "No unsigned assets found for $tag."
              continue
            fi

            upload_files=()
            for artifact in "${artifacts[@]}"; do
              cosign sign-blob --yes "$artifact" \
                --bundle "$artifact.sigstore.json" \
                --output-signature "$artifact.sig" \
                --output-certificate "$artifact.pem"

              upload_files+=("$artifact.sig" "$artifact.pem" "$artifact.sigstore.json")
            done

            gh release upload "$tag" "${upload_files[@]}" --clobber
          done <<< "$tags"
