name: Build & Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'
  PROJECT_PATH: 'Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj'
  # Version: MAJOR.MINOR comes from Directory.Build.props (VersionPrefix).
  # CI auto-increments PATCH from the latest git tag (v1.0.0 → v1.0.1 → v1.0.2).
  # To bump version: edit VersionPrefix in Directory.Build.props, commit, push.

permissions:
  contents: read

jobs:
  # Build, Test, and Scan
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mcpval-mcp/package-lock.json
          
      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Install npm dependencies
        working-directory: mcpval-mcp
        run: npm ci

      - name: Build npm package
        working-directory: mcpval-mcp
        run: npm run build

      - name: NuGet Audit
        run: |
          dotnet list mcp-benchmark-validation.sln package --vulnerable --include-transitive --format json > dotnet-audit.json
          python3 - <<'PY'
          import json
          import sys

          severities = {"low": 1, "moderate": 2, "high": 3, "critical": 4}
          threshold = severities["high"]
          findings = []

          def scan(node, project=None, framework=None):
              if isinstance(node, dict):
                  project = node.get("path", project)
                  framework = node.get("framework", framework)
                  package_name = node.get("name")
                  resolved_version = node.get("resolvedVersion") or node.get("requestedVersion")
                  vulnerabilities = node.get("vulnerabilities")

                  if package_name and isinstance(vulnerabilities, list):
                      for vulnerability in vulnerabilities:
                          severity = str(vulnerability.get("severity", "")).lower()
                          if severities.get(severity, 0) >= threshold:
                              findings.append({
                                  "severity": severity,
                                  "package": package_name,
                                  "version": resolved_version,
                                  "project": project,
                                  "framework": framework
                              })

                  for value in node.values():
                      scan(value, project, framework)
              elif isinstance(node, list):
                  for item in node:
                      scan(item, project, framework)

          with open("dotnet-audit.json", "r", encoding="utf-8") as handle:
              payload = json.load(handle)

          scan(payload)

          if findings:
              print("High or critical NuGet vulnerabilities detected:")
              for finding in findings:
                  print(f"- {finding['severity']}: {finding['package']} {finding['version']} ({finding['project']} / {finding['framework']})")
              sys.exit(1)

          print("No high or critical NuGet vulnerabilities detected.")
          PY

      - name: npm Audit
        working-directory: mcpval-mcp
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          status=$?
          set -e
          node - <<'NODE'
          const fs = require('fs');
          const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
          const vulnerabilities = audit.metadata?.vulnerabilities ?? {};
          console.log(`npm audit summary: critical=${vulnerabilities.critical ?? 0}, high=${vulnerabilities.high ?? 0}, moderate=${vulnerabilities.moderate ?? 0}, low=${vulnerabilities.low ?? 0}`);
          NODE
          exit $status
        
      - name: Build (Debug)
        run: dotnet build --no-restore --configuration Debug
        
      - name: Test (Unit & Integration)
        run: dotnet test --no-build --configuration Debug --verbosity normal --logger "trx;LogFileName=test-results.trx"
        
      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Upload Audit Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: audit-results
          path: |
            dotnet-audit.json
            mcpval-mcp/npm-audit.json

  # Create the self-contained EXE for multiple platforms
  package:
    name: Package ${{ matrix.rid }}
    needs: build-and-test
    # Only package on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows
          - rid: linux-x64
            os: linux
          - rid: osx-x64
            os: osx
          - rid: osx-arm64
            os: osx

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set Version
        id: package-version
        shell: bash
        run: |
          prefix=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          major_minor="${prefix%.*}"
          # Find latest tag for this major.minor, increment patch by 1
          latest=$(git tag --list "v${major_minor}.*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            patch=0
          else
            tag_prefix="v${major_minor}."
            patch="${latest#"$tag_prefix"}"
            patch=$((patch + 1))
          fi
          ver="${major_minor}.${patch}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Building version $ver for ${{ matrix.rid }}"

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:RestoreLockedMode=false \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:VersionPrefix=${{ steps.package-version.outputs.version }} \
            -p:Version=${{ steps.package-version.outputs.version }} \
            -o publish/${{ matrix.rid }}

      # Rename to include architecture for the release asset
      - name: Prepare Artifact
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [ "${{ matrix.os }}" == "windows" ]; then
            mv mcpval.exe mcpval-${{ matrix.rid }}.exe
          else
            mv mcpval mcpval-${{ matrix.rid }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcpval-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/mcpval-${{ matrix.rid }}*
          retention-days: 5

  # Create GitHub Release (Only on main push)
  publish:
    name: Publish Release
    needs: package
    # Only run on push to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      
      - name: Download Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: mcpval-*
          path: release-assets
          merge-multiple: true

      - name: Generate Release Tag
        id: tag
        run: |
          prefix=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          major_minor="${prefix%.*}"
          major="${major_minor%%.*}"
          latest=$(git tag --list "v${major_minor}.*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            patch=0
          else
            tag_prefix="v${major_minor}."
            patch="${latest#"$tag_prefix"}"
            patch=$((patch + 1))
          fi
          {
            echo "version=${major_minor}.${patch}"
            echo "tag=v${major_minor}.${patch}"
            echo "minor_tag=v${major_minor}"
            echo "major_tag=v${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: echo "### 🚀 Release v${{ steps.tag.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate Checksums
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          artifacts=(mcpval-*)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found to checksum." >&2
            exit 1
          fi
          shasum -a 256 "${artifacts[@]}" > SHA256SUMS.txt

      - name: Generate Release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release-assets
          format: spdx-json
          output-file: release-assets/sbom-release-binaries.spdx.json

      - name: Attest Release Binaries
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            release-assets/mcpval-*

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: v2.6.3

      - name: Sign Release Assets
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          artifacts=(mcpval-* SHA256SUMS.txt sbom-release-binaries.spdx.json)
          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "No release artifacts found to sign." >&2
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            cosign sign-blob --yes "$artifact" \
              --bundle "$artifact.sigstore.json" \
              --output-signature "$artifact.sig" \
              --output-certificate "$artifact.pem"
          done

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Distribution

            This release is published across multiple public channels. GitHub Marketplace is only the listing for the root composite action used with `uses: navalerakesh/mcp-validation-security@...`.

            ## Install

            **NuGet** (cross-platform, requires .NET 8):
            ```bash
            dotnet tool install --global McpVal --version ${{ steps.tag.outputs.version }}
            ```
            [![NuGet](https://img.shields.io/nuget/v/McpVal?logo=nuget)](https://www.nuget.org/packages/McpVal)

            **npm** (MCP server for AI agents):
            ```bash
            npx mcpval-localmcp
            ```
            [![npm](https://img.shields.io/npm/v/mcpval-localmcp?logo=npm)](https://www.npmjs.com/package/mcpval-localmcp)

            **Docker** (hardened non-root GHCR image):
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }} --help
            ```

            **Standalone binaries** (no runtime needed):
            Download the binary for your platform below.

      - name: Update Action Version Tags
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -fa "${{ steps.tag.outputs.minor_tag }}" -m "Release ${{ steps.tag.outputs.tag }}" "${GITHUB_SHA}"
          git tag -fa "${{ steps.tag.outputs.major_tag }}" -m "Release ${{ steps.tag.outputs.tag }}" "${GITHUB_SHA}"

          git push origin "refs/tags/${{ steps.tag.outputs.minor_tag }}" --force
          git push origin "refs/tags/${{ steps.tag.outputs.major_tag }}" --force

  # Publish to NuGet.org as a dotnet global tool
  nuget-publish:
    name: "Publish to NuGet (v${{ needs.publish.outputs.version }})"
    needs: [build-and-test, publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: NuGet
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Summary
        run: echo "### 📦 Publishing McpVal v${{ needs.publish.outputs.version }} to NuGet" >> "$GITHUB_STEP_SUMMARY"

      - name: Build & Pack NuGet Package
        run: |
          dotnet build Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj \
            --configuration Release \
            -p:Version=${{ needs.publish.outputs.version }}
          dotnet pack Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=${{ needs.publish.outputs.version }} \
            -o ./artifacts/nuget

      - name: Generate NuGet SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: artifacts/nuget
          format: spdx-json
          output-file: artifacts/nuget/mcpval.nuget.spdx.json

      - name: Attest NuGet Package
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            artifacts/nuget/*.nupkg

      - name: Upload NuGet Package Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-package-artifacts
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg
            artifacts/nuget/mcpval.nuget.spdx.json

      - name: Publish to NuGet.org
        run: |
          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No NuGet packages found to publish." >&2
            exit 1
          fi
          dotnet nuget push "${packages[@]}" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # Publish mcpval-localmcp to npm
  npm-publish:
    name: "Publish to npm (v${{ needs.publish.outputs.version }})"
    needs: [build-and-test, publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Npm
    permissions:
      contents: read
      attestations: write
      id-token: write
    defaults:
      run:
        working-directory: mcpval-mcp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Set Version
        run: npm version "${{ needs.publish.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Summary
        run: echo "### 📦 Publishing mcpval-localmcp v${{ needs.publish.outputs.version }} to npm" >> "$GITHUB_STEP_SUMMARY"

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Pack npm Artifact
        run: |
          mkdir -p dist-pack
          npm pack --pack-destination ./dist-pack

      - name: Generate npm SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./mcpval-mcp/dist-pack
          format: spdx-json
          output-file: ./mcpval-mcp/dist-pack/mcpval-localmcp.npm.spdx.json

      - name: Attest npm Package
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            mcpval-mcp/dist-pack/*.tgz

      - name: Upload npm Package Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package-artifacts
          path: |
            mcpval-mcp/dist-pack/*.tgz
            mcpval-mcp/dist-pack/mcpval-localmcp.npm.spdx.json

      - name: Publish to npm
        run: |
          shopt -s nullglob
          packages=(./dist-pack/*.tgz)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No npm package tarball found to publish." >&2
            exit 1
          fi
          npm publish "${packages[0]}" --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    name: "Publish Docker Image (v${{ needs.publish.outputs.version }})"
    needs: [build-and-test, publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.publish.outputs.version }}
            type=raw,value=${{ needs.publish.outputs.tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - name: Summary
        run: |
          echo "### 🐳 Published GHCR image ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Docker image includes OCI SBOM and provenance attestations." >> "$GITHUB_STEP_SUMMARY"
