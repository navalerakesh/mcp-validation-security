name: Build & Release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'reports/**'
      - 'TEMP/**'
      - 'PublicReports/**'
      - 'assets/**'
      - 'LICENSE'
      - 'LICENSE copy'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'reports/**'
      - 'TEMP/**'
      - 'PublicReports/**'
      - 'assets/**'
      - 'LICENSE'
      - 'LICENSE copy'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/CODEOWNERS'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'

  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj'
  # Version: MAJOR.MINOR comes from Directory.Build.props (VersionPrefix).
  # CI auto-increments PATCH from the latest git tag (v1.0.0 â†’ v1.0.1 â†’ v1.0.2).
  # To bump version: edit VersionPrefix in Directory.Build.props, commit, push.

jobs:
  # Build, Test, and Scan
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Restore dependencies
        run: dotnet restore
        
      - name: Build (Debug)
        run: dotnet build --no-restore --configuration Debug
        
      - name: Test (Unit & Integration)
        run: dotnet test --no-build --configuration Debug --verbosity normal --logger "trx;LogFileName=test-results.trx"
        
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/test-results.trx'

      - name: Security Audit
        run: dotnet list package --vulnerable --include-transitive

  # Create the self-contained EXE for multiple platforms
  package:
    name: Package ${{ matrix.rid }}
    needs: build-and-test
    # Only package on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows
          - rid: linux-x64
            os: linux
          - rid: osx-x64
            os: osx
          - rid: osx-arm64
            os: osx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set Version
        shell: bash
        run: |
          prefix=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          major_minor=$(echo $prefix | cut -d. -f1,2)
          # Find latest tag for this major.minor, increment patch by 1
          latest=$(git tag --list "v${major_minor}.*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            patch=0
          else
            patch=$(echo "$latest" | sed "s/v${major_minor}.//")
            patch=$((patch + 1))
          fi
          ver="${major_minor}.${patch}"
          echo "VERSION=$ver" >> $GITHUB_ENV
          echo "Building version $ver for ${{ matrix.rid }}"

      - name: Publish
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:VersionPrefix=${{ env.VERSION }} \
            -p:Version=${{ env.VERSION }} \
            -o publish/${{ matrix.rid }}

      # Rename to include architecture for the release asset
      - name: Prepare Artifact
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          if [ "${{ matrix.os }}" == "windows" ]; then
            mv mcpval.exe mcpval-${{ matrix.rid }}.exe
          else
            mv mcpval mcpval-${{ matrix.rid }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcpval-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/mcpval-${{ matrix.rid }}*
          retention-days: 5

  # Create GitHub Release (Only on main push)
  publish:
    name: Publish Release
    needs: package
    # Only run on push to main, not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mcpval-*
          path: release-assets
          merge-multiple: true

      - name: Generate Release Tag
        id: tag
        run: |
          prefix=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          major_minor=$(echo $prefix | cut -d. -f1,2)
          latest=$(git tag --list "v${major_minor}.*" --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            patch=0
          else
            patch=$(echo "$latest" | sed "s/v${major_minor}.//")
            patch=$((patch + 1))
          fi
          echo "TAG=v${major_minor}.${patch}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${major_minor}.${patch}" >> $GITHUB_ENV
          echo "version=${major_minor}.${patch}" >> $GITHUB_OUTPUT
          echo "tag=v${major_minor}.${patch}" >> $GITHUB_OUTPUT

      - name: Summary
        run: echo "### đźš€ Release v${{ env.RELEASE_VERSION }}" >> $GITHUB_STEP_SUMMARY

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Install

            **NuGet** (cross-platform, requires .NET 8):
            ```bash
            dotnet tool install --global McpVal --version ${{ env.RELEASE_VERSION }}
            ```
            [![NuGet](https://img.shields.io/nuget/v/McpVal?logo=nuget)](https://www.nuget.org/packages/McpVal)

            **npm** (MCP server for AI agents):
            ```bash
            npx mcpval-localmcp
            ```
            [![npm](https://img.shields.io/npm/v/mcpval-localmcp?logo=npm)](https://www.npmjs.com/package/mcpval-localmcp)

            **Standalone binaries** (no runtime needed):
            Download the binary for your platform below.

  # Publish to NuGet.org as a dotnet global tool
  nuget-publish:
    name: "Publish to NuGet (v${{ needs.publish.outputs.version }})"
    needs: [build-and-test, publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: NuGet
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Set Version
        run: echo "RELEASE_VERSION=${{ needs.publish.outputs.version }}" >> $GITHUB_ENV

      - name: Summary
        run: echo "### đź“¦ Publishing McpVal v${{ env.RELEASE_VERSION }} to NuGet" >> $GITHUB_STEP_SUMMARY

      - name: Build & Pack NuGet Package
        run: |
          dotnet build Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj \
            --configuration Release \
            -p:Version=${{ env.RELEASE_VERSION }}
          dotnet pack Mcp.Benchmark.CLI/Mcp.Benchmark.CLI.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=${{ env.RELEASE_VERSION }}

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push Mcp.Benchmark.CLI/bin/Release/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # Publish mcpval-localmcp to npm
  npm-publish:
    name: "Publish to npm (v${{ needs.publish.outputs.version }})"
    needs: [build-and-test, publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Npm
    defaults:
      run:
        working-directory: mcpval-mcp
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set Version
        run: npm version ${{ needs.publish.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Summary
        run: echo "### đź“¦ Publishing mcpval-localmcp v${{ needs.publish.outputs.version }} to npm" >> $GITHUB_STEP_SUMMARY

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
