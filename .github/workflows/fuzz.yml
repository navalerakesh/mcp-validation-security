name: Fuzz Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Mcp.Benchmark.Core/**'
      - 'Mcp.Benchmark.Infrastructure/**'
      - 'Mcp.Benchmark.Tests/**'
      - 'mcpval-mcp/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Mcp.Benchmark.Core/**'
      - 'Mcp.Benchmark.Infrastructure/**'
      - 'Mcp.Benchmark.Tests/**'
      - 'mcpval-mcp/**'
      - '.github/workflows/fuzz.yml'
  schedule:
    - cron: '17 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20'

jobs:
  dotnet-property-fuzz:
    name: FsCheck property fuzz tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Build tests
        run: dotnet build Mcp.Benchmark.Tests/Mcp.Benchmark.Tests.csproj --no-restore --configuration Debug

      - name: Run FsCheck fuzz tests
        run: dotnet test Mcp.Benchmark.Tests/Mcp.Benchmark.Tests.csproj --no-build --configuration Debug --filter "FullyQualifiedName~Fuzzing" --logger "trx;LogFileName=fuzz-test-results.trx"

      - name: Upload fuzz test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: dotnet-fuzz-test-results
          path: '**/fuzz-test-results.trx'

  typescript-property-fuzz:
    name: fast-check property fuzz tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mcpval-mcp/package-lock.json

      - name: Install npm dependencies
        working-directory: mcpval-mcp
        run: npm ci

      - name: Run fast-check tests
        working-directory: mcpval-mcp
        run: npm test
